input {
  file {
    path => "/var/log/cloudera/**/*.log"
    type => "cloudera"
    start_position => "beginning"
  }
}

filter {
  grok {
    match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{GREEDYDATA:msg}" }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "cloudera-%{+YYYY.MM.dd}"
  }
}
